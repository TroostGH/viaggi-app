<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a1929">
<title>Viaggi di Davide</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/x-icon" href="favicon.ico?v=4">
<link rel="shortcut icon" href="favicon.ico?v=4">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png?v=4">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png?v=4">
<link rel="icon" type="image/png" sizes="48x48" href="icons/favicon-48.png?v=4">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png?v=4">
<link rel="stylesheet" href="styles.css?v=15">
</head>
<body>
  <!-- ========== HEADER ========== -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <img src="icons/icon-192.png?v=4" alt="" width="32" height="32" class="logo-img">
        <span>Viaggi</span>
      </div>
      <div class="stats" id="stats">
        <span id="stat-trips">— viaggi</span>
        <span class="stat-sep">•</span>
        <span id="stat-countries">— paesi</span>
        <span class="stat-sep">•</span>
        <span id="stat-spent">— €</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="filter-pills" id="filter-pills">
        <button class="pill active" data-filter="all">Tutti</button>
        <button class="pill" data-filter="past">
          <span class="dot dot-past"></span> Passati
        </button>
        <button class="pill" data-filter="future">
          <span class="dot dot-future"></span> Futuri
        </button>
        <button class="pill" data-filter="draft">
          <span class="dot dot-draft"></span> Idee
        </button>
      </div>
      <button class="btn-primary" id="btn-new-trip">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        <span class="btn-label">Nuovo viaggio</span>
      </button>
    </div>
  </header>

  <!-- ========== MAIN: GLOBE + LIST ========== -->
  <main class="main">
    <section class="globe-wrap" id="globe-wrap">
      <div id="globe"></div>
      <div class="globe-hint" id="globe-hint">
        <span>🌍 Trascina per ruotare il globo • Clicca su un pin per aprire il viaggio</span>
      </div>
      <div class="loader" id="loader"><div class="spinner"></div><span>Carico i viaggi…</span></div>
    </section>

    <aside class="sidepanel" id="sidepanel">
      <div class="sidepanel-header">
        <h2>I tuoi viaggi</h2>
        <input type="search" id="search" placeholder="Cerca…" autocomplete="off">
      </div>
      <div class="trip-list" id="trip-list"></div>
    </aside>
  </main>

  <!-- ========== TRIP DETAIL MODAL ========== -->
  <div class="modal-backdrop hidden" id="trip-modal">
    <div class="modal-trip">
      <button class="modal-close" id="trip-modal-close" aria-label="Chiudi">&times;</button>
      <div class="modal-trip-content" id="modal-trip-content"></div>
    </div>
  </div>

  <!-- ========== NEW TRIP MODAL ========== -->
  <div class="modal-backdrop hidden" id="new-trip-modal">
    <div class="modal-form">
      <button class="modal-close" id="new-trip-modal-close" aria-label="Chiudi">&times;</button>
      <h2>Nuovo viaggio</h2>
      <form id="new-trip-form" autocomplete="off">
        <label>
          <span>Nome del viaggio</span>
          <input type="text" name="title" required placeholder="Es. Tarifa - kite trip">
        </label>
        <label class="location-field">
          <span>Luogo</span>
          <input type="text" name="location" id="location-input" required placeholder="Inizia a scrivere... es. Lisbona">
          <div class="location-suggestions" id="location-suggestions"></div>
          <input type="hidden" name="lat" id="loc-lat">
          <input type="hidden" name="lng" id="loc-lng">
          <input type="hidden" name="country" id="loc-country">
        </label>
        <div class="form-row">
          <label>
            <span>Data inizio</span>
            <input type="date" name="start_date" required>
          </label>
          <label>
            <span>Data fine</span>
            <input type="date" name="end_date" required>
          </label>
        </div>
        <label>
          <span>Note (opzionale)</span>
          <textarea name="notes" rows="3" placeholder="Volo, hotel, cose da ricordare…"></textarea>
        </label>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="cancel-new-trip">Annulla</button>
          <button type="submit" class="btn-primary">Crea viaggio</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ========== SCRIPTS ========== -->
  <script src="https://unpkg.com/globe.gl@2.32.6/dist/globe.gl.min.js"></script>
  <!-- Firebase config (creato manualmente dopo aver creato il progetto Firebase — vedi SETUP.md).
       Se il file manca, l'app gira in modalità locale (legge da data/trips.json).
       Tag onerror per non bloccare il caricamento se il file non esiste. -->
  <script src="firebase-config.js" onerror="console.info('firebase-config.js non trovato — modalità locale')"></script>
  <script type="module" src="app.js?v=15"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }
  </script>
</body>
</html>
